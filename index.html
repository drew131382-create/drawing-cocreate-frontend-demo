<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="./style.css?v=20260629-split">
    <title>一起画画吧 | 关卡地图</title>
  </head>
  <body>
    <div class="page-decor decor-cloud decor-cloud-left"></div>
    <div class="page-decor decor-cloud decor-cloud-right"></div>
    <div class="page-decor decor-star decor-star-top"></div>
    <div class="page-decor decor-star decor-star-right"></div>
    <div class="page-decor decor-rainbow"></div>
    <div class="page-decor decor-crayon"></div>

    <div class="app-shell">
      <section class="map-screen">
        <div class="map-shell">
          <aside class="map-sidebar">
            <section class="card hero-card tilt-left">
              <div class="hero-card-top">
                <h1>一起画画吧</h1>
                <span class="hero-pill">冒险地图</span>
              </div>
              <p>先在地图上选关，再进入单独的画画页面开始演示。</p>
            </section>

            <section class="card panel-card panel-blue tilt-right">
              <h2>冒险进度</h2>
              <div class="map-progress-stack">
                <div class="map-progress-badge">
                  <strong>当前推荐</strong>
                  <span id="mapCurrentLevelLabel">第 1 关</span>
                </div>
                <div class="map-progress-badge">
                  <strong>已经完成</strong>
                  <span id="mapCompletedCount">0 / 6</span>
                </div>
              </div>
              <p class="panel-help">所有关卡都可以点击，适合录屏时灵活切换演示顺序。</p>
            </section>

            <section class="card panel-card panel-mint tilt-left">
              <h2>本次冒险</h2>
              <div class="map-current-card">
                <div class="map-current-sticker" id="mapCurrentTheme">儿童涂鸦</div>
                <p id="mapCurrentDescription">从第一张画纸开始，先画出你最想补上的那一笔。</p>
              </div>
              <div class="button-row button-row-single">
                <button id="btnStartCurrentLevel">进入第 1 关</button>
              </div>
            </section>
          </aside>

          <main class="map-stage">
            <section class="map-board">
              <div class="map-board-header">
                <div class="map-board-title">
                  <span class="map-title-pill">彩虹冒险路线</span>
                  <h2>关卡地图</h2>
                </div>
                <div class="map-board-legend">
                  <span class="legend-pill legend-map-current">当前关</span>
                  <span class="legend-pill legend-map-done">已完成</span>
                  <span class="legend-pill legend-map-free">可进入</span>
                </div>
              </div>

              <div class="map-network">
                <svg class="map-path" viewBox="0 0 1000 620" aria-hidden="true">
                  <path d="M120 110 C230 80, 300 150, 360 180 S520 250, 585 235 S710 165, 775 235 S865 410, 910 505" />
                </svg>

                <div class="map-decoration map-decoration-cloud map-cloud-one"></div>
                <div class="map-decoration map-decoration-cloud map-cloud-two"></div>
                <div class="map-decoration map-decoration-star map-star-one"></div>
                <div class="map-decoration map-decoration-star map-star-two"></div>

                <button class="level-node level-node-1" type="button" data-level-id="1">
                  <span class="level-node-num">1</span>
                  <span class="level-node-title">儿童涂鸦</span>
                </button>

                <button class="level-node level-node-2" type="button" data-level-id="2">
                  <span class="level-node-num">2</span>
                  <span class="level-node-title">小动物朋友</span>
                </button>

                <button class="level-node level-node-3" type="button" data-level-id="3">
                  <span class="level-node-num">3</span>
                  <span class="level-node-title">云朵小镇</span>
                </button>

                <button class="level-node level-node-4" type="button" data-level-id="4">
                  <span class="level-node-num">4</span>
                  <span class="level-node-title">海底冒险</span>
                </button>

                <button class="level-node level-node-5" type="button" data-level-id="5">
                  <span class="level-node-num">5</span>
                  <span class="level-node-title">魔法花园</span>
                </button>

                <button class="level-node level-node-6" type="button" data-level-id="6">
                  <span class="level-node-num">6</span>
                  <span class="level-node-title">星空旅行</span>
                </button>
              </div>
            </section>
          </main>
        </div>
      </section>
    </div>
    <script src="level-data.js"></script>
    <script src="map.js"></script>
  </body>
</html>
